# Dependabot will run on day 25 of each month at 03:31 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "cron"
      day: 2
      timezone: "Europe/Berlin"
      cronjob: "31 3 25 * *"
    open-pull-requests-limit: 15
    assignees:
      - "oweitman"
    versioning-strategy: "increase"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      day: 2
      timezone: "Europe/Berlin"
      cronjob: "31 3 25 * *"
    open-pull-requests-limit: 15
    assignees:
      - "oweitman"
